name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          response=$(curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel response: $response"

  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          response=$(curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Render response: $response"

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: failure()
    steps:
      - name: Report failed deployment
        run: |
          echo "::error::One or more deployments failed. Check the Vercel and Render dashboards."
          exit 1
